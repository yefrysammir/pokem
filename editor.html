<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pokemon Builder</title>
<style>
#rar {
width: 120px;
}
*{box-sizing:border-box;}
body{margin:0;font-family:monospace;background:#0d0d0d;color:#00ff88;}
.container{padding:15px;display:grid;gap:10px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:6px;}
input,select,button{width:100%;padding:8px;font-size:14px;background:#1a1a1a;border:1px solid #333;color:#00ff88;}
button{background:#00ff88;color:#000;border:none;font-weight:bold;cursor:pointer;}
button:active{transform:scale(0.98);}
.console{background:#000;border-top:2px solid #00ff88;padding:10px;height:200px;overflow:auto;white-space:pre-wrap;font-size:12px;}
h3{margin:15px 0 5px 0;border-bottom:1px solid #333;padding-bottom:5px;}

/* Preview Styles */
.preview-box{background:#1a1a1a;border:2px solid #00ff88;border-radius:8px;padding:15px;margin-bottom:10px;}
.preview-display{height:150px;display:flex;align-items:center;justify-content:center;background:#000;border-radius:5px;margin:10px 0;}
.preview-img{max-height:120px;image-rendering:pixelated;}
.preview-img.dark{filter: hue-rotate(135deg);}
.preview-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.view-btn{background:#222;border:1px solid #444;color:#fff;cursor:pointer;padding:6px;font-size:12px;}
.view-btn.active{background:#00ff88;color:#000;}
.view-btn.shiny-btn.active{background:#ffd700;}
.view-btn.dark-btn.active{background:#ff0044;color:#fff;}
.label{grid-column:span 3;text-align:center;font-size:11px;color:#666;margin-top:5px;}
.delete-btn{background:#ff0044 !important;color:#fff !important;}

/* COMBO INPUT */
.combo-input-container{
    position:relative;
    display:flex;
    border:1px solid #333;
    border-radius:4px;
    overflow:hidden;
}
.combo-input-container input{
    flex:1;
    border:none;
    border-right:2px solid #444;
    background:#1a1a1a;
    padding:8px;
    color:#00ff88;
}
.combo-input-container input:focus{
    outline:none;
    background:#222;
}
.combo-trigger{
    width:40px;
    background:#1a1a1a;
    border:none;
    color:#00ff88;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    transition:background 0.2s;
}
.combo-trigger:hover{
    background:#252525;
}
.combo-trigger::after{
    content:"▼";
    font-size:10px;
}
.combo-dropdown{
    position:absolute;
    top:100%;
    left:0;
    right:0;
    max-height:200px;
    overflow-y:auto;
    background:#1a1a1a;
    border:1px solid #00ff88;
    border-top:none;
    z-index:100;
    display:none;
    scroll-behavior:smooth;
}
.combo-dropdown.show{
    display:block;
}
.combo-option{
    padding:8px;
    cursor:pointer;
    border-bottom:1px solid #333;
}
.combo-option:hover{
    background:#252525;
}
.combo-option.last-selected {
    background: linear-gradient(90deg, #004d40 0%, #1a1a1a 100%);
    border-left: 3px solid #00ff88;
    padding-left: 5px;
    font-weight: bold;
}
.combo-option small{
    color:#666;
    font-size:10px;
}
.no-results{
    padding:8px;
    color:#666;
    font-style:italic;
    text-align:center;
}

/* EMERGENCY MODE STYLES */
.emergency-container{
    grid-column:span 2;
    display:flex;
    align-items:center;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border:1px solid #333;
    border-radius:4px;
    flex-wrap:wrap;
}
.emergency-label{
    display:flex;
    align-items:center;
    gap:5px;
    cursor:pointer;
    color:#00ff88;
    font-size:13px;
    white-space:nowrap;
}
.emergency-label input[type="checkbox"]{
    width:auto;
    cursor:pointer;
    margin:0;
}
#pokemonId{
    flex:1;
    min-width:80px;
}
#pokemonId:disabled{
    background:#0d0d0d;
    color:#555;
    cursor:not-allowed;
    border-color:#222;
}
#pokemonId:not(:disabled){
    background:#1a1a1a;
    color:#00ff88;
    border-color:#00ff88;
    box-shadow:0 0 5px rgba(0,255,136,0.2);
}

::placeholder{color:#555;opacity:1;}
</style>
</head>

<body>

<div class="container">

<!-- PREVIEW -->
<div class="preview-box">
    <h3 style="margin-top:0;text-align:center;">Pokémon: <span id="pName">Esperando...</span></h3>
    <div class="preview-display">
        <img id="pImg" class="preview-img" style="display:none;">
        <span id="pText" style="color:#333;">Previsualización</span>
    </div>
    <div class="preview-controls">
        <div class="label">▼ FRONTAL ▼</div>
        <button onclick="setView('front','normal')" class="view-btn active" id="btn-f-n">Normal</button>
        <button onclick="setView('front','dark')" class="view-btn dark-btn" id="btn-f-d">Dark</button>
        <button onclick="setView('front','shiny')" class="view-btn shiny-btn" id="btn-f-s">Shiny</button>
        <div class="label">▼ ESPALDA ▼</div>
        <button onclick="setView('back','normal')" class="view-btn" id="btn-b-n">Normal</button>
        <button onclick="setView('back','dark')" class="view-btn dark-btn" id="btn-b-d">Dark</button>
        <button onclick="setView('back','shiny')" class="view-btn shiny-btn" id="btn-b-s">Shiny</button>
    </div>
</div>

<h3>General</h3>
<div class="grid" style="grid-template-columns: 2fr 1fr;">
    <!-- POKEMON: Input con búsqueda por texto Y número -->
    <div style="position:relative;">
        <div class="combo-input-container">
            <input type="text" id="name" placeholder="Nombre o ID Pokémon" oninput="updateLive(); filterPokemonDropdown()">
            <button type="button" class="combo-trigger" onclick="toggleDropdown('pokemonDropdown')" title="Ver lista"></button>
        </div>
        <div class="combo-dropdown" id="pokemonDropdown"></div>
</div>
    
    <select id="rar">
        <option value="" disabled selected>Rareza</option>
        <option>Normal</option>
        <option>Pseudo</option>
        <option>Legendario</option>
        <option>Singular</option>
        <option>Especial</option>
    </select>


    
    <!-- NUEVO: Sistema de ID con modo emergencia -->
    <div class="emergency-container">
        <label class="emergency-label" title="Activar para editar ID manualmente">
            <input type="checkbox" id="emergencyMode" onchange="toggleEmergencyMode()">
            <span>Modo emergencia</span>
        </label>
        <input id="pokemonId" placeholder="ID automático" disabled title="ID de la Pokédex (se asigna automáticamente)">
    </div>
</div>

<h3>Tipos</h3>
<div class="grid">
    <select id="type1">
        <option value="" disabled selected>Tipo 1...</option>
    </select>
    <select id="type2">
        <option value="" disabled selected>Tipo 2 (opcional)...</option>
    </select>
</div>

<h3>Movimientos (Máx 4)</h3>
<div class="grid">
    <!-- MOV 1 -->
    <div style="position:relative;">
        <div class="combo-input-container">
            <input type="text" class="mv-combo" id="mv1" placeholder="Mov 1 o busca..." oninput="filterMoveDropdown(1)">
            <button type="button" class="combo-trigger" onclick="toggleDropdown('moveDropdown1')" title="Ver lista"></button>
        </div>
        <div class="combo-dropdown" id="moveDropdown1"></div>
    </div>
    
    <!-- MOV 2 -->
    <div style="position:relative;">
        <div class="combo-input-container">
            <input type="text" class="mv-combo" id="mv2" placeholder="Mov 2 o busca..." oninput="filterMoveDropdown(2)">
            <button type="button" class="combo-trigger" onclick="toggleDropdown('moveDropdown2')" title="Ver lista"></button>
        </div>
        <div class="combo-dropdown" id="moveDropdown2"></div>
    </div>
    
    <!-- MOV 3 -->
    <div style="position:relative;">
        <div class="combo-input-container">
            <input type="text" class="mv-combo" id="mv3" placeholder="Mov 3 o busca..." oninput="filterMoveDropdown(3)">
            <button type="button" class="combo-trigger" onclick="toggleDropdown('moveDropdown3')" title="Ver lista"></button>
        </div>
        <div class="combo-dropdown" id="moveDropdown3"></div>
    </div>
    
    <!-- MOV 4 -->
    <div style="position:relative;">
        <div class="combo-input-container">
            <input type="text" class="mv-combo" id="mv4" placeholder="Mov 4 o busca..." oninput="filterMoveDropdown(4)">
            <button type="button" class="combo-trigger" onclick="toggleDropdown('moveDropdown4')" title="Ver lista"></button>
        </div>
        <div class="combo-dropdown" id="moveDropdown4"></div>
    </div>
</div>

<h3>Stats</h3>
<div class="grid">
    <input id="hp" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="HP base">
    <input id="atk" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Ataque base">
    <input id="def" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Defensa base">
    <input id="spd" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Velocidad base">
</div>

<h3>Evolución</h3>
<div class="grid">
    <input id="evo" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="ID evolución (opcional)">
    <input id="evLv" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Nivel evolución">
    <input id="evItem" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Item evolución">
</div>

<h3>Ratios</h3>
<div class="grid">
    <input id="rs" type="number" inputmode="decimal" step="0.1" placeholder="Ratio spawn">
    <input id="rc" type="number" inputmode="decimal" step="0.1" placeholder="Ratio captura">
    <input id="shinyR" type="number" inputmode="decimal" step="0.1" placeholder="Ratio shiny %">
    <input id="darkR" type="number" inputmode="decimal" step="0.1" placeholder="Ratio dark %">
</div>

<h3>Experiencia y Oro</h3>
<div class="grid">
    <input id="expY" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="EXP yield">
    <input id="goldY" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Gold yield">
</div>

<h3>Mapas</h3>
<div class="grid">
    <select id="map1">
        <option value="" disabled selected>Mapa 1...</option>
    </select>
    <select id="map2">
        <option value="" disabled selected>Mapa 2 (opcional)...</option>
    </select>
</div>

<h3>Gender</h3>
<div class="grid">
    <select id="hasGender">
        <option value="" disabled selected>¿Tiene género?</option>
        <option value="true">Sí</option>
        <option value="false">No</option>
    </select>
    <select id="maleChance">
        <option value="" disabled selected>% Macho...</option>
        <option value="0">0% Macho</option>
        <option value="25">25% Macho</option>
        <option value="50">50% Macho</option>
        <option value="75">75% Macho</option>
        <option value="87">87.5% Macho</option>
        <option value="100">100% Macho</option>
    </select>
</div>

<h3>Level Range</h3>
<div class="grid">
    <input id="lvMin" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Nivel mínimo">
    <input id="lvMax" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="Nivel máximo">
</div>

<input type="hidden" id="sp">
<input type="hidden" id="spb">
<input type="hidden" id="shSp">
<input type="hidden" id="shSpb">

<button onclick="addPokemon()">➕ Agregar</button>
<button onclick="copyAll()">📋 Copiar Todo</button>
<button onclick="deleteAll()" class="delete-btn">🗑️ Eliminar Todo</button>

<div class="console" id="console">// Consola lista...</div>

</div>

const pDropdown = document.getElementById('pokemonDropdown');

// Llenar dropdown de Pokémon (con ID para búsqueda)
function fillPokemonDropdown(filterText=''){
    pDropdown.innerHTML = '';
    const search = filterText.toLowerCase();
    const lastSelected = localStorage.getItem('lastPokemonSelected');
    let lastSelectedElement = null;
    let found = false;
    
    Object.entries(pokemonDB).forEach(([id,name])=>{
        // Buscar por nombre O por número de ID
        const matchName = name.toLowerCase().includes(search);
        const matchId = id.includes(search);
        
        if(search === '' || matchName || matchId){
            const div = document.createElement('div');
            div.className = 'combo-option';
            // Marcar último seleccionado con fondo especial
            if (name === lastSelected) {
                div.classList.add('last-selected');
            }
            div.innerHTML = `${name} <small>#${id}</small>`;
            div.onclick = ()=>selectPokemon(name);
            pDropdown.appendChild(div);
            found = true;
            
            if (name === lastSelected) {
                lastSelectedElement = div;
            }
        }
    });
    
    if(!found){
        pDropdown.innerHTML = '<div class="no-results">Sin resultados</div>';
    }
    
    // Auto-scroll al último seleccionado después de renderizar
    setTimeout(() => {
        if (lastSelectedElement) {
            lastSelectedElement.scrollIntoView({block: 'center', behavior: 'auto'});
        } else {
            // O mantener posición anterior si existe
            const savedScroll = localStorage.getItem('lastDropdownScroll');
            if (savedScroll && !filterText) {
                pDropdown.scrollTop = parseInt(savedScroll);
            }
        }
    }, 0);
}

function getPokemonIdByName(name) {
    const search = name.toLowerCase().trim();
    if (!search) return null;
    
    // Buscar por nombre exacto
    for (let [id, pname] of Object.entries(pokemonDB)) {
        if (pname.toLowerCase() === search) {
            return id;
        }
    }
    
    // Si no hay exacto y el input es número, verificar si existe ese ID
    if (/^\d+$/.test(search) && pokemonDB[search]) {
        return search;
    }
    
    return null;
}

function updatePokemonIdField() {
    const nameInput = document.getElementById('name');
    const idInput = document.getElementById('pokemonId');
    const emergencyMode = document.getElementById('emergencyMode').checked;
    
    // Solo actualizar automáticamente si NO está en modo emergencia
    if (!emergencyMode) {
        const id = getPokemonIdByName(nameInput.value);
        if (id) {
            idInput.value = id;
        } else {
            idInput.value = '';
        }
    }
}

function toggleEmergencyMode() {
    const checkbox = document.getElementById('emergencyMode');
    const idInput = document.getElementById('pokemonId');
    
    if (checkbox.checked) {
        // Habilitar edición manual
        idInput.disabled = false;
        idInput.placeholder = "ID manual";
        idInput.focus();
    } else {
        // Deshabilitar y volver a automático
        idInput.disabled = true;
        idInput.placeholder = "ID automático";
        updatePokemonIdField(); // Recalcular según Pokémon seleccionado
    }
}

function toggleDropdown(id){
    document.querySelectorAll('.combo-dropdown').forEach(d=>{
        if(d.id !== id) d.classList.remove('show');
    });
    const dropdown = document.getElementById(id);
    dropdown.classList.toggle('show');
    
    // Guardar posición de scroll al cerrar (para el de Pokémon)
    if (id === 'pokemonDropdown' && !dropdown.classList.contains('show')) {
        localStorage.setItem('lastDropdownScroll', dropdown.scrollTop);
    }
}

// NUEVO: Filtrar Pokémon por texto o número
function filterPokemonDropdown(){
    const val = document.getElementById('name').value;
    fillPokemonDropdown(val);
    // Mostrar dropdown si hay texto
    if(val.length > 0){
        pDropdown.classList.add('show');
    }
}

// NUEVO: Filtrar movimientos
function filterMoveDropdown(num){
    const val = document.getElementById(`mv${num}`).value.toLowerCase();
    const dropdown = document.getElementById(`moveDropdown${num}`);
    const options = dropdown.querySelectorAll('.combo-option');
    let found = false;
    
    options.forEach(opt=>{
        const text = opt.textContent.toLowerCase();
        const match = text.includes(val);
        opt.style.display = match ? 'block' : 'none';
        if(match) found = true;
    });
    
    // Mostrar/ocultar dropdown según haya texto
    if(val.length > 0){
        dropdown.classList.add('show');
    }
}

function selectPokemon(name){
    document.getElementById('name').value = name;
    
    // Guardar selección y scroll en localStorage
    localStorage.setItem('lastPokemonSelected', name);
    localStorage.setItem('lastDropdownScroll', pDropdown.scrollTop);
    
    pDropdown.classList.remove('show');
    updateLive();
    updatePokemonIdField();
    
    // TRUCO: Volver a renderizar para mostrar el fondo verde
    fillPokemonDropdown();
}

function render(){
    if(data.length===0){
        consoleEl.innerText="// Consola lista...";
    }else{
        consoleEl.innerText=data.join("\n");
    }
    consoleEl.scrollTop=consoleEl.scrollHeight;
}

function clean(arr){
    return arr.filter(v=>v&&v.trim()!=="");
}

function updateLive(){
    const name=document.getElementById('name').value.trim();
    const pImg=document.getElementById('pImg');
    const pText=document.getElementById('pText');
    const pName=document.getElementById('pName');
    
    if(name && /^[a-zA-Z0-9\-]+$/.test(name)){
        const nameLower=name.toLowerCase();
        const base="https://play.pokemonshowdown.com/sprites";
        
        document.getElementById('sp').value=`${base}/ani/${nameLower}.gif`;
        document.getElementById('spb').value=`${base}/ani-back/${nameLower}.gif`;
        document.getElementById('shSp').value=`${base}/ani-shiny/${nameLower}.gif`;
        document.getElementById('shSpb').value=`${base}/ani-back-shiny/${nameLower}.gif`;
        
        pName.innerText=name;
        updatePreview();
        pImg.style.display='block';
        pText.style.display='none';
        
        // Actualizar ID automático si no es modo emergencia
        updatePokemonIdField();
    }else{
        pImg.style.display='none';
        pText.style.display='block';
        pName.innerText='Esperando...';
    }
}

function setView(side,type){
    currentView={side,type};
    document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`btn-${side.charAt(0)}-${type.charAt(0)}`).classList.add('active');
    updatePreview();
}

function updatePreview(){
    const sp=document.getElementById('sp').value;
    const spb=document.getElementById('spb').value;
    const shSp=document.getElementById('shSp').value;
    const shSpb=document.getElementById('shSpb').value;
    const img=document.getElementById('pImg');
    
    let src='';
    if(currentView.side==='front'){
        src=currentView.type==='shiny'?shSp:sp;
    }else{
        src=currentView.type==='shiny'?shSpb:spb;
    }
    
    if(src){
        img.src=src;
        img.className='preview-img '+(currentView.type==='dark'?'dark':'');
    }
}

function validateFields(){
    const fields={
        name:document.getElementById('name').value.trim(),
        rar:document.getElementById('rar').value,
        type1:document.getElementById('type1').value,
        hp:document.getElementById('hp').value,
        atk:document.getElementById('atk').value,
        def:document.getElementById('def').value,
        spd:document.getElementById('spd').value,
        rs:document.getElementById('rs').value,
        rc:document.getElementById('rc').value,
        shinyR:document.getElementById('shinyR').value,
        darkR:document.getElementById('darkR').value,
        expY:document.getElementById('expY').value,
        goldY:document.getElementById('goldY').value,
        map1:document.getElementById('map1').value,
        hasGender:document.getElementById('hasGender').value,
        lvMin:document.getElementById('lvMin').value,
        lvMax:document.getElementById('lvMax').value
    };
    
    for(let key in fields){
        if(fields[key]===""||fields[key]===null){
            alert(`Campo obligatorio vacío: ${key}`);
            return false;
        }
    }
    
    if(!/^[a-zA-Z0-9\-]+$/.test(fields.name)){
        alert("Nombre solo puede contener letras, números y guiones");
        return false;
    }
    
    // Validar que tenga ID válido (automático o manual)
    const pokemonId = document.getElementById('pokemonId').value;
    if (!pokemonId) {
        alert("ID no válido. Selecciona un Pokémon o activa modo emergencia para poner ID manual.");
        return false;
    }
    
    return true;
}

function addPokemon(){
    if(!validateFields())return;
    
    const emergencyMode = document.getElementById('emergencyMode').checked;
    const manualId = document.getElementById('pokemonId').value;
    const pokemonName = document.getElementById('name').value.trim();
    
    // Determinar ID: si es emergencia usa el manual, si no busca el automático o usa contador
    let id;
    if (emergencyMode) {
        id = manualId || counter;
    } else {
        id = getPokemonIdByName(pokemonName) || counter;
    }
    
    const name=document.getElementById('name').value.trim();
    const nameLower=name.toLowerCase();
    const base="https://play.pokemonshowdown.com/sprites";
    
    const sp=document.getElementById('sp').value||`${base}/ani/${nameLower}.gif`;
    const spb=document.getElementById('spb').value||`${base}/ani-back/${nameLower}.gif`;
    const shSp=document.getElementById('shSp').value||`${base}/ani-shiny/${nameLower}.gif`;
    const shSpb=document.getElementById('shSpb').value||`${base}/ani-back-shiny/${nameLower}.gif`;
    
    const typesArr=clean([t1.value,t2.value]);
    if(typesArr.length===0)typesArr.push('normal');
    
    const moves=clean([
        document.getElementById('mv1').value,
        document.getElementById('mv2').value,
        document.getElementById('mv3').value,
        document.getElementById('mv4').value
    ]);
    if(moves.length===0)moves.push('Placaje');
    
    const obj=`${counter}:{id:${id},n:'${name}',t:${JSON.stringify(typesArr)},mv:${JSON.stringify(moves)},sp:'${sp}',spb:'${spb}',bs:{hp:${document.getElementById('hp').value},atk:${document.getElementById('atk').value},def:${document.getElementById('def').value},spd:${document.getElementById('spd').value}},evo:${document.getElementById('evo').value?`[${document.getElementById('evo').value}]`:"[]"},evLv:${document.getElementById('evLv').value||"null"},rar:'${document.getElementById('rar').value}',rs:${document.getElementById('rs').value},rc:${document.getElementById('rc').value},shSp:'${shSp}',shSpb:'${shSpb}',evItem:${document.getElementById('evItem').value||"null"},expY:${document.getElementById('expY').value},goldY:${document.getElementById('goldY').value},mapT:${JSON.stringify(clean([document.getElementById('map1').value,document.getElementById('map2').value]))},gender:{hasGender:${document.getElementById('hasGender').value==="true"},maleChance:${document.getElementById('hasGender').value==="true"?document.getElementById('maleChance').value:0}},lvR:[${document.getElementById('lvMin').value},${document.getElementById('lvMax').value}],shinyR:${document.getElementById('shinyR').value},darkR:${document.getElementById('darkR').value}},`;
    
    data.push(obj);
    counter++;
    save();
    render();
    resetAll();
}

function resetAll(){
    document.getElementById('name').value='';
    document.getElementById('mv1').value='';
    document.getElementById('mv2').value='';
    document.getElementById('mv3').value='';
    document.getElementById('mv4').value='';
    document.getElementById('hp').value='';
    document.getElementById('atk').value='';
    document.getElementById('def').value='';
    document.getElementById('spd').value='';
    document.getElementById('evo').value='';
    document.getElementById('evLv').value='';
    document.getElementById('evItem').value='';
    document.getElementById('rs').value='';
    document.getElementById('rc').value='';
    document.getElementById('shinyR').value='';
    document.getElementById('darkR').value='';
    document.getElementById('expY').value='';
    document.getElementById('goldY').value='';
    document.getElementById('lvMin').value='';
    document.getElementById('lvMax').value='';
    
    // Resetear ID y modo emergencia
    document.getElementById('pokemonId').value='';
    document.getElementById('emergencyMode').checked=false;
    document.getElementById('pokemonId').disabled=true;
    document.getElementById('pokemonId').placeholder="ID automático";
    
    document.getElementById('rar').selectedIndex=0;
    document.getElementById('type1').selectedIndex=0;
    document.getElementById('type2').selectedIndex=0;
    document.getElementById('map1').selectedIndex=0;
    document.getElementById('map2').selectedIndex=0;
    document.getElementById('hasGender').selectedIndex=0;
    document.getElementById('maleChance').selectedIndex=0;
    
    document.getElementById('pImg').style.display='none';
    document.getElementById('pText').style.display='block';
    document.getElementById('pName').innerText='Esperando...';
    document.getElementById('sp').value='';
    document.getElementById('spb').value='';
    document.getElementById('shSp').value='';
    document.getElementById('shSpb').value='';
    
    // Resetear dropdowns de búsqueda
    fillPokemonDropdown();
    for(let i=1; i<=4; i++){
        document.getElementById(`moveDropdown${i}`).querySelectorAll('.combo-option').forEach(opt=>{
            opt.style.display = 'block';
        });
    }
}

function copyAll(){
    if(data.length===0)return alert("No hay datos");
    navigator.clipboard.writeText(data.join("\n")).then(()=>{
        alert(`Copiados ${data.length} registros`);
    });
}

function deleteAll(){
    if(data.length===0)return;
    if(confirm(`¿Eliminar ${data.length} Pokémon guardados?`)){
        data=[];
        counter=1;
        localStorage.removeItem("pokeData");
        localStorage.removeItem("pokeCounter");
        localStorage.removeItem("lastPokemonSelected");
        localStorage.removeItem("lastDropdownScroll");
        render();
    }
}

render();
