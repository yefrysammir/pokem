<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>POKEM</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="intro-ov" class="intro-overlay"></div>
<div id="hud">
  <div class="hud-logo">POKEM</div>
  <div class="hud-gold"><span class="ms" style="font-size:16px;color:var(--gold)">paid</span> <span id="hud-gold">0</span></div>
  <div class="hud-avatar" id="hud-avatar-wrap" onclick="hudAvatarClick()" style="cursor:pointer">
    <img id="hud-avatar-img" src="" onerror="this.style.display='none'" alt="">
    <span class="ms" id="hud-avatar-ph" style="font-size:16px;color:var(--dim)">person</span>
  </div>
  <div class="hud-team" id="hud-team"></div>
</div>
<div id="notif"></div>
<div id="main">
  <div id="screen-radar" class="screen" style="display:flex">
    <div id="radar-container" class="radar-container">
      <canvas id="radar-canvas"></canvas>
      <!-- Overlays sobre el mapa -->
      <div class="map-coords-ov" id="radar-coords">X:0 Y:0</div>
      <button class="map-info-ov-btn" onclick="openMapInfo()"><span class="ms" style="font-size:18px">info</span></button>
      <!-- Panel de spawns (esquina inferior izquierda) -->
      <div class="spawn-ov" id="spawn-ov">
        <div class="spawn-ov-header" onclick="toggleSpawnOv()">
          <span style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text)">APARICIONES</span>
          <span id="spawn-count-badge" class="spawn-count-badge">0</span>
          <span class="ms" id="spawn-ov-chevron" style="font-size:14px;color:var(--dim);margin-left:auto">expand_less</span>
        </div>
        <div id="spawn-list" class="spawn-ov-body"></div>
      </div>
      <!-- D-pad (esquina inferior derecha) -->
      <div class="dpad-ov">
        <div class="dpad-row"><button class="dpad-btn-ov" onclick="move(0,-1)">▲</button></div>
        <div class="dpad-row">
          <button class="dpad-btn-ov" onclick="move(-1,0)">◀</button>
          <div class="dpad-center-ov"><span class="ms" style="font-size:14px;color:var(--dim)">gps_fixed</span></div>
          <button class="dpad-btn-ov" onclick="move(1,0)">▶</button>
        </div>
        <div class="dpad-row"><button class="dpad-btn-ov" onclick="move(0,1)">▼</button></div>
      </div>
    </div>
  </div>
  <div id="screen-battle" class="screen"></div>
  <div id="screen-team" class="screen"></div>
  <div id="screen-pc" class="screen"></div>
  <div id="screen-shop" class="screen"></div>
  <div id="screen-inventory" class="screen"></div>
  <div id="screen-trainers" class="screen"></div>
  <div id="screen-codes" class="screen"></div>
  <div id="screen-profile" class="screen"></div>
</div>
<nav id="nav">
  <button class="nav-btn active" data-s="radar" onclick="goTo('radar')"><span class="ms">radar</span>Mapa</button>
  <button class="nav-btn" data-s="team" onclick="goTo('team')"><span class="ms">swords</span>Equipo</button>
  <button class="nav-btn" data-s="pc" onclick="goTo('pc')"><span class="ms">computer</span>PC</button>
  <button class="nav-btn" data-s="shop" onclick="goTo('shop')"><span class="ms">storefront</span>Tienda</button>
  <button class="nav-btn" data-s="inventory" onclick="goTo('inventory')"><span class="ms">backpack</span>Items</button>
  <button class="nav-btn" data-s="trainers" onclick="goTo('trainers')"><span class="ms">military_tech</span>Gyms</button>
  <button class="nav-btn" data-s="codes" onclick="goTo('codes')"><span class="ms">redeem</span>Código</button>
</nav>
<div id="enc-ov" class="overlay" onclick="if(event.target===this)closeOv('enc-ov')"></div>
<div id="map-ov" class="overlay" onclick="if(event.target===this)closeOv('map-ov')"></div>
<div id="evo-ov" class="overlay"></div>
<script src="app.js"></script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
</body>
</html>
